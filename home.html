<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
    function addNameToList(item, shouldScroll = false){
        
        let list = document.getElementById("output");
        let newItem = document.createElement("li");
        if(isOverdue(item.dueDate)&& !item.completed){
            newItem.classList.add("overdue");
        }
        newItem.dataset.id = item.id;
        newItem.draggable = true;

        newItem.addEventListener("dragstart", function(){
            draggedItem = newItem;
            newItem.classList.add("dragging");
        });

        newItem.addEventListener("dragend",function(){
            draggedItem = null;
            newItem.classList.remove("dragging");

            document.querySelectorAll("li").forEach(li => {
                li.classList.remove("drop-target");

            });

            saveDragOrder();
        });


        newItem.addEventListener("dragover", function(e){
            e.preventDefault();

            if(!draggedItem || draggedItem === newItem) return;
            document.querySelectorAll("li").forEach(li => {
                li.classList.remove("drop-target");

            });

            newItem.classList.add("drop-target");


            //const draggingItem = document.querySelector(".dragging");
            const rect = newItem.getBoundingClientRect();

        const today = new Date();

        return due < today;
