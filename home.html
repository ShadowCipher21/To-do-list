    <div class="container">
        <h2>Welcome App</h2>
        <div class="input-group">
            <input id="username" placeholder="Enter Your username">

            <button id="filter-completed" onclick="setFilter('completed')">Completed</button>
         </div>
         <div id="counter" style="margin-top: 10px; font-size: 14px; color: #555;"></div>

    function saveDragOrder(){
        const list = document.getElementById("output");
        const items = list.querySelectorAll("li");

        let newOrder = [];
        items.forEach(li => {
            let id = Number(li.dataset.id);
            let found = names.find(t => t.id === id);
            if (found) newOrder.push(found);

        });
        names = newOrder;
        localStorage.setItem("names", JSON.stringify(names));
        updateCounter();
    }
    //let names = JSON.parse(localStorage.getItem("names")) || [];
    let names = [];
    try{
        const stored = localStorage.getItem("names");
        names = stored ? JSON.parse(stored) : [];

    } catch (e){
        console.error("Corrupted localStorage data. Resetting...");
        names = [];
        localStorage.removeItem("names");
    }

    let currentFilter = "all";
    let draggedItem = null;

    function setFilter(filter){
        currentFilter = filter;
        renderList();
        updateFilterUI();
    }

    function updateFilterUI(){
        document.getElementById("filter-all").classList.remove("active");
        document.getElementById("filter-active").classList.remove("active");
        document.getElementById("filter-completed").classList.remove("active");

        if(currentFilter === "all"){
            document.getElementById("filter-all").classList.add("active");
        }
        if(currentFilter === "active"){
            document.getElementById("filter-active").classList.add("active");

        }
        if(currentFilter === "completed"){
            document.getElementById("filter-completed").classList.add("active");
        }

    }
    function getPriorityValue(priority){
        if(priority === "high")return 1;
        if(priority === "medium")return 2;
        return 3;
    }
    function isOverdue(date){
        if(!date) return false;
        const today = new Date();
        const due = new Date(date);

        today.setHours(0,0,0,0);
        due.setHours(0,0,0,0);

        return due < today;
    }
    
    function renderList(shouldScroll = false){
        let list = document.getElementById("output");
        let emptyMsg = document.getElementById("emptyMsg");

        list.innerHTML = "";

        if(names.length === 0 ){
            emptyMsg.style.display = "block";
        }else{
            emptyMsg.style.display = "none";
            
            let filtered = names.filter(item => {
                if (currentFilter === "active") return !item.completed;
                if (currentFilter === "completed") return item.completed;
                return true;

            });

            if(!draggedItem){
                filtered.sort((a,b) => {
                    if(a.completed !== b.completed){
                        return a.completed - b.completed;
                    }
                    return getPriorityValue(a.priority) - getPriorityValue(b.priority);
                    
                });

            }
            

            filtered.forEach(function(item){
                addNameToList(item, false);
                
            });
            updateCounter();
            // names.forEach(function(item){
            //     addNameToList(item, false);
            // });

            // scroll fix 
            if(shouldScroll){
                setTimeout(() => {
                    list.scrollTop = list.scrollHeight;

                }, 100);
            }
            
        }

        
    }

    names = names.map(item => {
        if (typeof item === "string"){
            return{ 
                id: Date.now(),
                text: item, 
                completed: false,
                priority: "medium",
                dueDate: null
            };
        }
        if (!item.priority){
            item.priority = "medium";
        }
        if(!item.dueDate){
            item.dueDate = null;
        }
        return item;
    }); 


    function updateCounter(){
        let active = names.filter(t => !t.completed).length;
        let completed = names.filter(t => t.completed).length;
        let total = names.length;

        document.getElementById("counter").innerText = `Active: ${active} | Completed: ${completed} | Total: ${total}`;

        let percent = total === 0 ? 0: Math.round((completed/total)*100);
        document.getElementById("progress-bar").style.width = percent + "%";
        
        document.getElementById("progress-text").innerText = percent + "% completed";

    }

        if(!expandedTask.contains(e.target)){
            gsap.to(expandedTask,{
                scale: 0.8,
                opacity: 0,
                duration: 0.2,
                onComplete: () => {
                    expandedTask.classList.remove("expanded");

                    gsap.set(expandedTask,{
                        clearProps: "all"
                    });
                }
            });
        }
    });
